name: Release Model Bundle

on:
  workflow_dispatch:
    inputs:
      manifest_id:
        description: Manifest id from registry/models without the .yaml suffix
        required: true
        type: string
      revision:
        description: Optional Hugging Face revision override
        required: false
        type: string

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install bundling dependencies
        run: pip install -r tools/model_release/requirements.txt

      - name: Build release bundle
        env:
          HF_HUB_ENABLE_HF_TRANSFER: 1
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          MANIFEST="registry/models/${{ inputs.manifest_id }}.yaml"
          test -f "$MANIFEST"
          if [ -n "${{ inputs.revision }}" ]; then
            python tools/model_release/bundle_model.py \
              --manifest "$MANIFEST" \
              --output-dir dist \
              --revision "${{ inputs.revision }}"
          else
            python tools/model_release/bundle_model.py \
              --manifest "$MANIFEST" \
              --output-dir dist
          fi

      - name: Extract release metadata
        id: metadata
        run: |
          METADATA_PATH=$(find dist -name release_metadata.json | head -n 1)
          TITLE=$(jq -r '.id + " @ " + .resolved_revision' "$METADATA_PATH")
          echo "release_tag=$(jq -r .release_tag "$METADATA_PATH")" >> "$GITHUB_OUTPUT"
          echo "bundle_dir=$(dirname "$METADATA_PATH")" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "notes_path=$(dirname "$METADATA_PATH")/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.metadata.outputs.release_tag }}" >/dev/null 2>&1; then
            gh release edit "${{ steps.metadata.outputs.release_tag }}" \
              --title "${{ steps.metadata.outputs.title }}" \
              --notes-file "${{ steps.metadata.outputs.notes_path }}"
          else
            gh release create "${{ steps.metadata.outputs.release_tag }}" \
              --title "${{ steps.metadata.outputs.title }}" \
              --notes-file "${{ steps.metadata.outputs.notes_path }}"
          fi
          gh release upload "${{ steps.metadata.outputs.release_tag }}" \
            "${{ steps.metadata.outputs.bundle_dir }}"/* \
            --clobber
