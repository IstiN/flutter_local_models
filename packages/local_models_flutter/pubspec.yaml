name: local_models_flutter
description: Flutter wrapper around the local model core with a macOS-native FFI bridge for MLX-focused runtimes.
version: 0.1.0
repository: https://github.com/IstiN/flutter_local_models
publish_to: none

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  crypto: ^3.0.7
  ffi: ^2.1.4
  flutter:
    sdk: flutter
  local_models_core:
    path: ../local_models_core
  local_models_sdk:
    path: ../local_models_sdk
  path: ^1.9.1
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      macos:
        pluginClass: LocalModelsFlutterPlugin
