name: local_models_studio
description: Minimal macOS desktop app for local model catalog browsing and runtime inspection.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  file_selector: ^1.0.3
  flutter_svg: ^2.2.3
  local_models_core:
    path: ../../packages/local_models_core
  local_models_flutter:
    path: ../../packages/local_models_flutter
  local_models_sdk:
    path: ../../packages/local_models_sdk
  path: ^1.9.1
  record: ^6.1.2
  audioplayers: ^6.6.0
  flutter_bloc: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter

flutter:
  config:
    enable-swift-package-manager: true
  uses-material-design: true
  assets:
    - assets/catalog.json
    - assets/icons/
