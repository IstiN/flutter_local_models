id: qwen3-tts-12hz-1.7b-voicedesign-4bit
display_name: Qwen3 TTS 12Hz 1.7B VoiceDesign 4bit
description: Larger Qwen3 TTS model with natural-language voice design support for higher-quality local speech output.
runtime_adapter: mlx_audio
tasks:
- text_to_speech
- audio_output
source:
  provider: huggingface
  repo: mlx-community/Qwen3-TTS-12Hz-1.7B-VoiceDesign-4bit
  revision: main
  license: apache-2.0
packaging:
  release_tag: model-qwen3-tts-12hz-1.7b-voicedesign-4bit
  archive_name: qwen3-tts-12hz-1.7b-voicedesign-4bit.tar
  chunk_size_bytes: 1900000000
  asset_prefix: qwen3-tts-12hz-1.7b-voicedesign-4bit
requirements:
  platform: macos-apple-silicon
  min_memory_gb: 16
  recommended_memory_gb: 32
  notes:
  - Qwen3 TTS VoiceDesign
  - Natural language voice description required
capabilities:
  audio_input: false
  audio_output: true
  tool_calling: false
runtime_config:
  default_parameters:
    audio_format: wav
    join_audio: true
    lang_code: auto
    speed: 1.0
    instruct: A calm, natural assistant voice with stable tone, speaking clearly.
  parameter_schema:
    type: object
    properties:
      instruct:
        type: string
        description: Natural-language voice design prompt passed to --instruct.
      lang_code:
        type: string
        description: Qwen3-TTS language passed to --lang_code.
        enum: [auto, chinese, english, japanese, korean, german, french, russian, portuguese, spanish, italian]
      speed:
        type: number
        minimum: 0.5
        maximum: 2.0
    required: [instruct]
  extra:
    qwen_tts_mode: voice_design
    supports_instruction_control: true
  output:
    media_type: audio/wav
    extension: wav
    supports_inline_playback: true
model_card:
  summary: Larger Qwen3 TTS model with voice design support for higher-quality local speech output.
  use_cases:
  - Spoken assistant responses with designed voices
  - Local TTS playback in Flutter chat
  - Voice UX prototyping
  limitations:
  - VoiceDesign requires an instruct prompt describing the target voice
  - Language should be auto or a full Qwen language name such as russian/english
  - Generated speech consistency depends on instruction quality
  languages:
  - Chinese
  - English
  - Japanese
  - Korean
  - German
  - French
  - Russian
  - Portuguese
  - Spanish
  - Italian
  tags:
  - tts
  - audio
  - speech
  - mlx-audio
  - qwen3-tts
  - voice-design
  links:
    huggingface: https://huggingface.co/mlx-community/Qwen3-TTS-12Hz-1.7B-VoiceDesign-4bit
