id: voxcpm2-4bit
display_name: VoxCPM2 4bit
description: Multilingual MLX text-to-speech and voice cloning model for local assistant
  voices.
runtime_adapter: mlx_audio
tasks:
- text_to_speech
- audio_output
source:
  provider: huggingface
  repo: mlx-community/VoxCPM2-4bit
  revision: main
  license: apache-2.0
packaging:
  release_tag: model-voxcpm2-4bit
  archive_name: voxcpm2-4bit.tar
  chunk_size_bytes: 1900000000
  asset_prefix: voxcpm2-4bit
requirements:
  platform: macos-apple-silicon
  min_memory_gb: 12
  recommended_memory_gb: 24
  notes:
  - MLX Audio TTS
  - Multilingual voice generation
  - Requires mlx-audio from GitHub until VoxCPM2 support ships in a PyPI release
capabilities:
  audio_input: false
  audio_output: true
  tool_calling: false
runtime_config:
  default_parameters:
    audio_format: wav
    join_audio: true
    lang_code: en
    cfg_scale: 2.0
    ddpm_steps: 7
    max_tokens: 2000
  parameter_schema:
    type: object
    properties:
      voice:
        type: string
      speed:
        type: number
        minimum: 0.5
        maximum: 2.0
      cfg_scale:
        type: number
        minimum: 2.0
        maximum: 5.0
      ddpm_steps:
        type: integer
        minimum: 4
        maximum: 30
      max_tokens:
        type: integer
        minimum: 64
        maximum: 4096
  voices:
  - id: default
    display_name: Default VoxCPM2
    locale: multilingual
  output:
    media_type: audio/wav
    extension: wav
    supports_inline_playback: true
  extra:
    mlx_audio_model_type: voxcpm2
    mlx_audio_source: git+https://github.com/Blaizzy/mlx-audio.git@f7c11556eda88731be5cc75ddbdf4a4cb9eeaafc
    default_inference_timesteps: 7
    default_cfg_value: 2.0
model_card:
  summary: Multilingual MLX text-to-speech and voice cloning model for local assistant
    voices.
  use_cases:
  - Spoken assistant responses
  - Local TTS playback in Flutter chat
  - Voice UX prototyping
  limitations:
  - Voice controls vary by model family
  - Generated speech quality depends on prompt and runtime support
  - Requires a GitHub mlx-audio build because PyPI mlx-audio 0.4.3 does not include VoxCPM2 yet
  languages:
  - multilingual
  tags:
  - tts
  - audio
  - speech
  - mlx-audio
  links:
    huggingface: https://huggingface.co/mlx-community/VoxCPM2-4bit
