id: voxcpm2-4bit
display_name: VoxCPM2 4bit
description: Multilingual MLX text-to-speech and voice cloning model for local assistant voices.
runtime_adapter: mlx_audio
tasks:
  - text_to_speech
  - audio_output
source:
  provider: huggingface
  repo: mlx-community/VoxCPM2-4bit
  revision: main
  license: apache-2.0
packaging:
  release_tag: model-voxcpm2-4bit
  archive_name: voxcpm2-4bit.tar
  chunk_size_bytes: 1900000000
  asset_prefix: voxcpm2-4bit
requirements:
  platform: macos-apple-silicon
  min_memory_gb: 12
  recommended_memory_gb: 24
  notes:
    - MLX Audio TTS
    - Multilingual voice generation
capabilities:
  audio_input: false
  audio_output: true
  tool_calling: false
runtime_config:
  default_parameters:
    audio_format: wav
    join_audio: true
  parameter_schema:
    type: object
    properties:
      voice:
        type: string
      speed:
        type: number
        minimum: 0.5
        maximum: 2.0
  voices:
    - id: default
      display_name: Default VoxCPM2
      locale: multilingual
  output:
    media_type: audio/wav
    extension: wav
    supports_inline_playback: true
