id: vibevoice-realtime-0.5b-4bit
display_name: VibeVoice Realtime 0.5B 4bit
description: Microsoft VibeVoice-Realtime 0.5B (MIT) as an MLX 4bit TTS checkpoint; streaming-style
  text input, low first-chunk latency (~300 ms class), long-form speech (~10 min class, 8k context),
  Qwen2.5-0.5B + 7.5 Hz acoustic tokenizer. English-first; extra languages experimental upstream.
runtime_adapter: mlx_audio
tasks:
- text_to_speech
- audio_output
source:
  provider: huggingface
  repo: mlx-community/VibeVoice-Realtime-0.5B-4bit
  revision: main
  license: mit
packaging:
  release_tag: model-vibevoice-realtime-0.5b-4bit
  archive_name: vibevoice-realtime-0.5b-4bit.tar
  chunk_size_bytes: 1900000000
  asset_prefix: vibevoice-realtime-0.5b-4bit
requirements:
  platform: macos-apple-silicon
  min_memory_gb: 8
  recommended_memory_gb: 16
  notes:
  - VibeVoice-Realtime focuses on low-latency research TTS; follow upstream responsible-use guidance
  - Optional extra speaker bundles — microsoft/VibeVoice demo/download_experimental_voices.sh
  - Long-form VibeVoice-TTS (~1.5B) is separate; upstream removed public TTS code from GitHub Sept 2025
capabilities:
  audio_input: false
  audio_output: true
  tool_calling: false
runtime_config:
  default_parameters:
    audio_format: wav
    join_audio: true
    voice: en-Emma_woman
    speed: 1.0
  parameter_schema:
    type: object
    properties:
      voice:
        type: string
        description: Speaker voice id — filename without .safetensors from the voices/ subdirectory.
        enum:
        - en-Emma_woman
        - en-Carter_man
        - en-Davis_man
        - en-Frank_man
        - en-Grace_woman
        - en-Mike_man
        - de-Spk0_man
        - de-Spk1_woman
        - fr-Spk0_man
        - fr-Spk1_woman
        - it-Spk0_woman
        - it-Spk1_man
        - jp-Spk0_man
        - jp-Spk1_woman
        - kr-Spk0_woman
        - kr-Spk1_man
        - nl-Spk0_man
        - nl-Spk1_woman
        - pl-Spk0_man
        - pl-Spk1_woman
        - pt-Spk0_woman
        - pt-Spk1_man
        - sp-Spk0_woman
        - sp-Spk1_man
        - in-Samuel_man
      speed:
        type: number
        minimum: 0.5
        maximum: 2.0
  voices:
  - id: en-Emma_woman
    display_name: Emma
    locale: English
    description: Built-in English female voice.
  - id: en-Carter_man
    display_name: Carter
    locale: English
    description: English male voice.
  - id: en-Davis_man
    display_name: Davis
    locale: English
    description: English male voice.
  - id: en-Frank_man
    display_name: Frank
    locale: English
    description: English male voice.
  - id: en-Grace_woman
    display_name: Grace
    locale: English
    description: English female voice.
  - id: en-Mike_man
    display_name: Mike
    locale: English
    description: English male voice.
  - id: de-Spk0_man
    display_name: German Male
    locale: German
    description: German male voice (experimental).
  - id: de-Spk1_woman
    display_name: German Female
    locale: German
    description: German female voice (experimental).
  - id: fr-Spk0_man
    display_name: French Male
    locale: French
    description: French male voice (experimental).
  - id: fr-Spk1_woman
