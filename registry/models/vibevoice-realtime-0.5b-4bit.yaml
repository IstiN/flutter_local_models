  output:
    media_type: audio/wav
    extension: wav
    supports_inline_playback: true
  extra:
    vibevoice_tts_mode: realtime
    upstream_family: VibeVoice-Realtime-0.5B
    base_llm: Qwen2.5-0.5B
    acoustic_frame_hz: 7.5
    microsoft_hf: https://huggingface.co/microsoft/VibeVoice-Realtime-0.5B
    docs_streaming: https://github.com/microsoft/VibeVoice/blob/main/docs/vibevoice-realtime-0.5b.md
model_card:
  summary: MIT Realtime VibeVoice line (0.5B); MLX 4bit port from microsoft/VibeVoice-Realtime-0.5B.
  use_cases:
  - Low-latency spoken assistant replies (research / prototyping)
  - Local Flutter TTS demos paired with an LM
  limitations:
  - Research-only intent per Microsoft model card; disclose AI-generated speech
  - English-trained; other languages may be unstable without upstream experimental voice assets
  languages:
