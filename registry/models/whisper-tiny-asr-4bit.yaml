id: whisper-tiny-asr-4bit
display_name: Whisper Tiny ASR 4bit
description: Tiny multilingual Whisper MLX-Audio speech-to-text model for fast Russian and English dictation tests.
runtime_adapter: mlx_audio
tasks:
- speech_to_text
- audio_input
source:
  provider: huggingface
  repo: mlx-community/whisper-tiny-asr-4bit
  revision: main
  license: apache-2.0
packaging:
  release_tag: model-whisper-tiny-asr-4bit
  archive_name: whisper-tiny-asr-4bit.tar
  chunk_size_bytes: 1900000000
  asset_prefix: whisper-tiny-asr-4bit
requirements:
  platform: macos-apple-silicon
  min_memory_gb: 4
  recommended_memory_gb: 8
  notes:
  - MLX-Audio Whisper STT runtime
  - Fastest Whisper option; use base/small for better accuracy
capabilities:
  audio_input: true
  audio_output: false
  tool_calling: false
runtime_config:
  default_parameters:
    task: transcribe
    language: auto
    temperature: 0.0
    word_timestamps: false
  parameter_schema:
    type: object
    properties:
      task:
        type: string
        enum: [transcribe, translate]
      language:
        type: string
        description: ISO language hint or auto.
        enum: [auto, en, ru]
      temperature:
        type: number
        minimum: 0.0
        maximum: 1.0
      word_timestamps:
        type: boolean
  extra:
    model_type: whisper
    architecture: WhisperForConditionalGeneration
    decoder_layers: 4
    tokenizer_model_max_length: 1024
    quantization:
      bits: 4
      group_size: 64
      mode: affine
    hf_downloads_last_month: 6
    hf_size_bytes: 26426403
    mlx_audio_command: mlx_audio.stt
  output:
    media_type: text/plain
    format: text
model_card:
  summary: Tiny multilingual Whisper MLX-Audio speech-to-text model for fast Russian and English dictation tests.
  use_cases:
  - Fast voice input for voice-to-voice pipeline tests
  - Russian and English ASR smoke tests
  - Offline dictation prototypes
  limitations:
  - Lowest accuracy Whisper tier
  - No audio generation; pair with a TTS model for voice output
  languages:
  - English
  - Russian
  - multilingual
  tags:
  - whisper
  - asr
  - speech-to-text
  - mlx-audio
  - compact
  links:
    huggingface: https://huggingface.co/mlx-community/whisper-tiny-asr-4bit

