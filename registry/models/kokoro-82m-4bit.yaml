id: kokoro-82m-4bit
display_name: Kokoro 82M 4bit
description: Tiny MLX TTS model for very fast local English voice output on Apple
  Silicon.
runtime_adapter: mlx_audio
tasks:
- text_to_speech
- audio_output
source:
  provider: huggingface
  repo: mlx-community/Kokoro-82M-4bit
  revision: main
  license: apache-2.0
packaging:
  release_tag: model-kokoro-82m-4bit
  archive_name: kokoro-82m-4bit.tar
  chunk_size_bytes: 1900000000
  asset_prefix: kokoro-82m-4bit
requirements:
  platform: macos-apple-silicon
  min_memory_gb: 4
  recommended_memory_gb: 8
  notes:
  - Very small TTS runtime
  - Fast local speech output
capabilities:
  audio_input: false
  audio_output: true
  tool_calling: false
runtime_config:
  default_parameters:
    audio_format: wav
    join_audio: true
    voice: af_heart
  parameter_schema:
    type: object
    properties:
      voice:
        type: string
      speed:
        type: number
        minimum: 0.5
        maximum: 2.0
  voices:
  - id: af_heart
    display_name: AF Heart
    locale: en-US
  - id: af_bella
    display_name: AF Bella
    locale: en-US
  - id: am_adam
    display_name: AM Adam
    locale: en-US
  output:
    media_type: audio/wav
    extension: wav
    supports_inline_playback: true
model_card:
  summary: Tiny MLX TTS model for very fast local English voice output on Apple Silicon.
  use_cases:
  - Spoken assistant responses
  - Local TTS playback in Flutter chat
  - Voice UX prototyping
  limitations:
  - Voice controls vary by model family
  - Generated speech quality depends on prompt and runtime support
  languages:
  - multilingual
  tags:
  - tts
  - audio
  - speech
  - mlx-audio
  links:
    huggingface: https://huggingface.co/mlx-community/Kokoro-82M-4bit
